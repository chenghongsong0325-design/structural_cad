# =============================================================================
# 繪圖標準設定檔 — default.yaml(依競賽「圖層規定」)
# =============================================================================
# 這份檔案用「設定」的方式描述一套繪圖標準:圖層、線型、文字型、標註型。
# 之後要換標準,只要複製一份改成 client_XXX.yaml,不動任何程式碼。
#
# 由 src/standards/loader.py 讀取,套用到一份 ezdxf 文件上。
#
# 【圖層】完全依競賽規範的「圖層規定」表(TEXT/DIM/DW/HIDDEN/COL/WALL/
#   HANDRAIL/BORDER/ARCH/OTHER),含線型、顏色、出圖線粗。規範沒列、但引擎模組
#   仍需要的圖層(如結構軸網 AXIS、梁 S-RCBMB)沿用舊圖層(見下方「其餘照舊」)。
#
# 【別名】既有模組用語意代碼(COLUMN/A-WALL/A-DOOR…),透過檔尾的 layer_aliases
#   自動對應到規範圖層(COL/WALL/DW…),模組程式不必改、輸出 DXF 用規範圖層名。
#
# ⚠️ 註解裡「待確認」= 暫定值/預設值,需再確認;方便日後搜尋一次找出。
# -----------------------------------------------------------------------------

meta:
  name: default
  description: 繪圖標準(依競賽圖層規定;結構/建築共用一套圖層)

  # ── 圖層命名慣例 ────────────────────────────────────────────────────────
  # 實際圖層名 = 樓層前綴 + 分隔符 + 英文代碼
  #   例如:  2F建築底圖$0$COLUMN
  #          └─ 前綴 ──┘└分隔┘└代碼┘
  #
  # 「$0$」是 AutoCAD 把外部參考(xref)「併入(bind)」到主圖時,
  # 自動加在原圖層名前面的分隔符;前綴「2F建築底圖」其實就是那個 xref 的檔名。
  # 也因此同一套結構圖層,套到不同樓層時只是「前綴」不同、代碼與樣式都一樣。
  #
  # loader 會用下面這個分隔符,把「代碼」組成完整圖層名。
  # 沒有前綴時(prefix="")就直接用代碼本身當圖層名。
  layer_separator: "$0$"

  # ── 梁斷面標示格式慣例(僅記錄,供日後文字/標註模組產生標籤時參考)─────────
  # 梁斷面尺寸習慣寫成「寬 × 深(mm)」,例如 240×235 = 寬 240mm、深 235mm。
  # (深 = 梁高;寬在前、深在後,中間用全形或半形的乘號 ×)
  beam_section_format: "{width}×{depth}"   # width=寬(mm), depth=深/梁高(mm)

# 繪圖單位:結構圖一律用公釐。loader 會對應到 ezdxf.units.MM。
units: MM

# 全域線型比例($LTSCALE)。太小 → 虛線/中心線看起來像實線;太大 → 整段變一長劃。
# 以 mm 為單位、數千 mm 尺度的結構圖,30 是合理起點。
# 待確認:實際出圖尺度(1:50 vs 1:100)可能要微調此值。
ltscale: 30

# -----------------------------------------------------------------------------
# 線型(linetype)
# -----------------------------------------------------------------------------
# CONTINUOUS(實線)一定存在,不必定義。
# CENTER 若文件是用 ezdxf.new(setup=True) 建的也已內建;這裡仍給一組 pattern,
# 讓 loader 在沒有 setup 的文件上也能自行建立(自我完整、不依賴外部前置)。
#
# pattern 格式:第一個數字 = 一個完整循環的總長度;其餘正數 = 實線段、負數 = 空白段
# (單位為繪圖單位,實際顯示長度再乘上 ltscale)。
linetypes:
  - name: CONTINUOUS
    description: 實線
  - name: CENTER
    description: 中心線(長劃-點-長劃),用於建築線 ARCH
    pattern: [2.0, 1.25, -0.25, 0.25, -0.25]
  - name: HIDDEN
    description: 虛線,用於 HIDDEN 圖層(排水溝等)
    pattern: [0.75, 0.5, -0.25]
  - name: PHANTOM
    description: 假想線(長劃-兩短劃),用於地界線 BORDER
    pattern: [3.5, 2.5, -0.25, 0.5, -0.25, 0.5, -0.25]
  # 註:HIDDEN / PHANTOM / CENTER 在 ezdxf.new(setup=True) 的文件已內建,
  #     這裡仍給 pattern,讓沒有 setup 的文件也能自行建立(自我完整)。

# -----------------------------------------------------------------------------
# 文字型(text style / STYLE 表)
# -----------------------------------------------------------------------------
# height = 0.0 代表「可變高度」:字型本身不鎖死高度,建立文字時再指定,
# 這是結構圖常見做法(同一個文字型可用在不同比例尺)。
text_styles:
  - name: STRUCT
    # 待確認:中文字型檔。先用「標楷體」kaiu.ttf(Windows 內建、支援中文)。
    #        若公司統一用某個 .shx 中文字型,改成該檔名即可。
    font: kaiu.ttf
    height: 0.0
    # 建議文字高度(模型單位 mm,約等於紙上 2.5mm 的常見標註字):
    #   1:100 出圖 → 250 mm
    #   1:50  出圖 → 125 mm
    # 待業主確認實際字高後,由標註/文字模組在建立文字時帶入。

# -----------------------------------------------------------------------------
# 標註型(dimension style / DIMSTYLE 表)
# -----------------------------------------------------------------------------
# ⚠️ 待確認:以下所有數值都是「業界常見預設」,務必依公司標準圖例調整。
#    這些欄位對應 AutoCAD 的 DIM 系統變數(括號內為變數名)。
dim_styles:
  - name: STRUCT
    text_style: STRUCT   # 用哪個文字型(需在上面 text_styles 有定義)
    text_height: 250     # (DIMTXT) 標註文字高度,對應 1:100;1:50 改 125
    arrow_size: 250      # (DIMASZ) 箭頭/建築斜線大小
    ext_beyond: 125      # (DIMEXE) 尺寸界線超出尺寸線的長度
    ext_offset: 250      # (DIMEXO) 尺寸界線起點與標註物的間隙
    text_gap: 90         # (DIMGAP) 文字與尺寸線的間隙
    scale: 1.0           # (DIMSCALE) 標註整體比例;若改用圖紙空間出圖再議
    decimals: 0          # (DIMDEC) 小數位數;結構標註常用整數 mm

# -----------------------------------------------------------------------------
# 圖層(layer)——依競賽「圖層規定」表
# -----------------------------------------------------------------------------
# 每個圖層記「代碼(code)」而非完整名稱;完整名稱由 loader 依樓層前綴組出來。
#   color     : AutoCAD ACI 色號(1~255)。 1=紅 2=黃 3=綠 4=青 5=藍 6=洋紅 7=白/黑 9=灰
#   linetype  : 對應上面 linetypes 的 name(未列出的線型 loader 會退回 CONTINUOUS)
#   lineweight: 出圖線粗,單位 1/100 mm(0.25mm→25、0.15mm→15、0.35mm→35、0.50mm→50)
layers:
  # ── 競賽規範圖層(圖層規定表,10 層)──────────────────────────────────
  - code: TEXT
    color: 1            # 紅
    linetype: CONTINUOUS
    lineweight: 25      # 0.25mm
    description: 文字

  - code: DIM
    color: 4            # 青
    linetype: CONTINUOUS
    lineweight: 15      # 0.15mm
    description: 尺度

  - code: DW
    color: 3            # 綠
    linetype: CONTINUOUS
    lineweight: 15      # 0.15mm
    description: 開口(門窗)

  - code: HIDDEN
    color: 5            # 藍
    linetype: HIDDEN
    lineweight: 15      # 0.15mm
    description: 虛線(排水溝)

  - code: COL
    color: 6            # 洋紅
    linetype: CONTINUOUS
    lineweight: 50      # 0.50mm
    description: 柱剖面線

  - code: WALL
    color: 2            # 黃
    linetype: CONTINUOUS
    lineweight: 35      # 0.35mm
    description: 牆

  - code: HANDRAIL
    color: 9            # 灰
    linetype: CONTINUOUS
    lineweight: 15      # 0.15mm
    description: 樓梯、扶手、陽台

  - code: BORDER
    color: 70
    linetype: PHANTOM
    lineweight: 25      # 0.25mm
    description: 地界線

  - code: ARCH
    color: 10
    linetype: CENTER
    lineweight: 25      # 0.25mm
    description: 建築線

  - code: OTHER
    color: 7            # 白/黑
    linetype: CONTINUOUS
    lineweight: 15      # 0.15mm
    description: 其他

  # ── 其餘照舊:規範未列、但引擎模組仍需要的舊圖層 ─────────────────────
  # 結構軸網(gridlines 模組用);規範的圖層表沒有軸網層,沿用舊 AXIS。
  - code: AXIS
    color: 1            # 紅
    linetype: CENTER
    description: 軸線/軸網(規範未列,沿用舊圖層)

  # 梁輪廓(members 模組畫梁用);規範無梁層,沿用舊 S-RCBMB/S-RCBMG。
  - code: S-RCBMB
    color: 140          # 青
    linetype: CONTINUOUS
    description: 梁的主要輪廓(規範未列,沿用舊圖層)

  - code: S-RCBMG
    color: 140          # 青
    linetype: CONTINUOUS
    description: 梁的另一部分標示(規範未列,沿用舊圖層)

# -----------------------------------------------------------------------------
# 圖層別名(layer_aliases)——語意代碼 → 實際規範圖層代碼
# -----------------------------------------------------------------------------
# 既有模組習慣用「語意代碼」(COLUMN、A-WALL、A-DOOR…)去 layers 對照表取圖層。
# 這裡把它們對應到規範圖層,loader 會讓 layers["COLUMN"] 直接拿到 COL 的完整圖層名,
# 因此模組程式一行都不用改,輸出的 DXF 就是規範的圖層名(COL/WALL/DW/TEXT…)。
layer_aliases:
  COLUMN: COL      # 柱 → 柱剖面線
  A-WALL: WALL     # 建築牆 → 牆
  A-DOOR: DW       # 門 → 開口(門窗)
  A-GLAZ: DW       # 窗 → 開口(門窗)
  A-TEXT: TEXT     # 建築標註文字 → 文字
  S-TEXTB: TEXT    # 結構標註文字 → 文字
  S-THIN: OTHER    # 細線(圖框框線等) → 其他
